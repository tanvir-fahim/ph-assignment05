<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Git IT | Home</title>

</head>

<body>

    <main>
        <nav class="flex items-center justify-between px-8 py-4 bg-white border-b border-gray-200">

            <div class="flex items-center space-x-3">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-8 h-8">
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">
                    GitHub Issues Tracker
                </h1>
            </div>

            <div class="flex items-center gap-4">

                <div>
                    <input type="text" placeholder="Search issues..."
                        class="pl-10 pr-3 py-2 border border-gray-300 rounded-md  bg-white placeholder-gray-500 sm:text-sm">
                </div>

                <button
                    class=" btn flex items-center px-4 py-2 bg-[#6320EE] hover:bg-[#5219d1] text-white text-sm font-semibold rounded-md">
                    New Issue
                </button>

            </div>
        </nav>

        <section>
            <div class="p-10 bg-slate-50 flex items-center justify-center">
                <div
                    class="container mx-auto w-11/12 bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex items-center gap-2">

                    <button class="btn border-none text-white px-8"
                        style="background-color: #4B00FF;">
                        All
                    </button>

                    <button
                        class="btn btn-outline border-gray-200 text-slate-500 px-8">
                        Open
                    </button>

                    <button
                        class="btn btn-outline border-gray-200 text-slate-500 px-8">
                        Closed
                    </button>

                </div>
            </div>
        </section>

        <section>
            
        </section>
    </main>

</body>

</html>
