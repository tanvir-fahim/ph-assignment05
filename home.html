<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Git IT | Home</title>

</head>

<body>

    <main>
        <nav class="flex items-center justify-between px-8 py-4 bg-white border-b border-gray-200">

            <div class="flex items-center space-x-3">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-8 h-8">
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">
                    GitHub Issues Tracker
                </h1>
            </div>

            <div class="flex items-center space-x-4">

                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                    </span>
                    <input type="text" placeholder="Search issues..."
                        class="block w-64 pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>

                <button
                    class="flex items-center px-4 py-2 bg-[#6320EE] hover:bg-[#5219d1] text-white text-sm font-semibold rounded-md transition-colors">
                    <i class="fa-solid fa-plus mr-2"></i>
                    New Issue
                </button>

            </div>
        </nav>

        <section>
            <div class="p-6 bg-slate-50 min-h-[200px] flex items-center justify-center">
                <div
                    class="w-full max-w-4xl bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex items-center gap-2">

                    <button class="btn border-none text-white normal-case min-h-10 h-10 px-8 hover:opacity-90"
                        style="background-color: #4B00FF;">
                        All
                    </button>

                    <button
                        class="btn btn-outline border-gray-200 text-slate-500 normal-case min-h-10 h-10 px-8 hover:bg-gray-50 hover:border-gray-300 hover:text-slate-600">
                        Open
                    </button>

                    <button
                        class="btn btn-outline border-gray-200 text-slate-500 normal-case min-h-10 h-10 px-8 hover:bg-gray-50 hover:border-gray-300 hover:text-slate-600">
                        Closed
                    </button>

                </div>
            </div>
        </section>
    </main>

</body>

</html>
