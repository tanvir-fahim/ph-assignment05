<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fav Icon -->
     <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">

    <title>Git IT | Login</title>

</head>

<body>
    <div id="login" class="min-h-screen bg-slate-50 flex items-center justify-center p-6">

        <div class="card card-body w-full max-w-md bg-white p-10 shadow-sm">

            <div class="flex flex-col items-center gap-2 mb-8">               
                    <div class="flex items-center justify-center">
                        <img src="assets/github-logo.png" alt=""/>
                    </div>

                <h1 class="text-2xl font-bold text-gray-800 mt-2">GitHub Issues Tracker</h1>
                <p class="text-sm text-gray-500">Sign in to manage your issues</p>
            </div>

            <div class="form-control w-full space-y-5">
                <div class="space-y-2">
                    <label class="label">
                        <span class="label-text font-semibold text-gray-700">Username</span>
                    </label>
                    <input id="usernameInput" type="text" placeholder="Enter Username"
                        class="input input-bordered w-full focus:input-primary" />
                    <label class="label">
                        <span class="label-text-alt text-primary font-medium">Default: admin</span>
                    </label>
                </div>

                <div class="space-y-2">
                    <label class="label">
                        <span class="label-text font-semibold text-gray-700">Password</span>
                    </label>
                    <input id="passwordInput" type="password" placeholder="Enter Password"
                        class="input input-bordered w-full focus:input-primary" />
                    <label class="label">
                        <span class="label-text-alt text-primary font-medium">Default: admin123</span>
                    </label>
                </div>

                <div class="pt-2">
                    <button class="btn btn-primary w-full text-white text-lg font-medium" onclick="showHome()">
                        Sign In
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script/index.js"></script>
</body>

</html>
